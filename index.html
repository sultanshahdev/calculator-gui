<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="script.css">
    <script href="app.js"> </script>
</head>
<body>
    <div class="calculator-container">
        <div class="panel">
            <div class="menu">
                <img src="images/sidebar.png" width="30px">
            </div>
            <div class="text" id="calculator-literal">
                Calculator
            </div>
            <div class="mode-icon">
                <img src="images/sun.png" width="30px">
            </div>
        </div>  
        <div class="display-screen">
            <div class="numeral">
                9999
            </div>
        </div>
        <div class="buttons">
            <div class="block-one">
                <button class="button " id="c-button">
                    C
                </button>
                <button class="button" id="divide-button">
                    %
                </button>
                <button class="button" id="modulo-button">
                    %
                </button>
                <button class="button" id="divide-button">
                    ÷
                </button>
                <button class="button" id="seven">
                    7
                </button>
                <button class="button" id="eight">
                    8
                </button>
                <button class="button" id="nine">
                    9
                </button>
                <button class="button" id="multiply">
                    x
                </button>
                <button class="button" id="four">
                    4
                </button>
                <button class="button" id="five">
                    5
                </button>
                <button class="button" id= "six">
                    6
                </button>
                <button class="button" id="minus">
                    -
                </button>
            </div>
        <div class="block-two">
            <div class="block-three">
                <button class="button" id="one">
                    1
                </button>
                <button class="button" id="two">
                    2
                </button>
                <button class="button" id="three">
                    3
                </button>
                <button class="button" id ="zero">
                    0
                </button class="button" >
                <button class="button" id="decimal">
                    .
                </button>
                <button class="button" id="equal">
                    =
                </button>
            </div>
            <div class="block-four">
                <button class="button" id=plus>
                    +
                </button>
            </div>
        </div>
    </div>
</body>
</html>
